<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0c0a08" />
    <!-- iOS: allow a chrome-free fullscreen experience when Added to Home Screen -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Crypt Stalkers" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Crypt Stalkers</title>
  </head>
  <body>
    <div id="root"></div>

    <!-- Device prompt. `data-mode` is set by src/device-prompt.ts to one of:
         "rotate"      → portrait, ask to rotate to landscape
         "fullscreen"  → landscape but browser chrome present, offer fullscreen
         (absent)      → hidden -->
    <div id="device-prompt" aria-hidden="true">
      <div class="device-prompt__inner">
        <div class="device-prompt__rotate">
          <div class="device-prompt__icon">📱</div>
          <p class="device-prompt__title">Rotate your device</p>
          <p class="device-prompt__text">Crypt Stalkers is best played in landscape.</p>
        </div>
        <div class="device-prompt__fullscreen">
          <div class="device-prompt__icon device-prompt__icon--static">🕯️</div>
          <p class="device-prompt__title">Enter fullscreen</p>
          <p class="device-prompt__text">
            The crypt is darker with no light above. Go fullscreen for more room to play.
          </p>
          <button id="device-prompt-enter" type="button" class="device-prompt__btn">
            Go Fullscreen
          </button>
          <button id="device-prompt-dismiss" type="button" class="device-prompt__dismiss">
            Not now
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
